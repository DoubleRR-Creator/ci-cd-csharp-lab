name: .NET CI 
on:
    push:
        branches: [ "master" ]
    pull_request:
        branches: [ "master" ]
jobs:
    build:
        runs-on: ubuntu-latest

        steps:
        - uses: actions/checkout@v3 

        - name: Setup .NET
          uses: actions/setup-dotnet@v3 
          with:
            dotnet-version: '8.0.x' 

        - name: Restore dependencies
          run: dotnet restore CalculatorApp.slnx 

        - name: Build
          run: dotnet build CalculatorApp.slnx --no-restore 

        - name: Test
          run: dotnet test CalculatorApp.slnx 